<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKT 통합 채널 UT 프로토타입</title>
<style>
:root {
  --bg-page: #FFFFFF;
  --bg-surface: #F5F5F5;
  --bg-surface-2: #EEEEEE;
  --bg-frame: #D9D9D9;

  --border-default: #DDDDDD;

  --text-primary: #111111;
  --text-secondary: #666666;

  --action: #3B49DF;

  --font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
                 "Pretendard", "Noto Sans KR", system-ui, sans-serif;

  --fs-title: 20px;
  --fs-body: 15px;
  --fs-caption: 12px;

  --fw-regular: 400;
  --fw-medium: 600;

  --s-2: 8px;
  --s-3: 12px;
  --s-4: 16px;
  --s-5: 20px;
  --s-6: 24px;
  --s-8: 32px;

  --radius-md: 10px;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  font-family: var(--font-family);
  color: var(--text-primary);
  background: var(--bg-frame);
  min-height: 100vh;
  font-size: var(--fs-body);
  line-height: 1.5;
}

a {
  font: inherit;
  cursor: pointer;
  color: inherit;
  text-decoration: none;
}

.page {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: var(--s-6) var(--s-4);
}

.container {
  width: 100%;
  max-width: 480px;
  background: var(--bg-page);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-md);
  padding: var(--s-8) var(--s-6);
}

@media (max-width: 480px) {
  .page { padding: 0; }
  .container {
    border: 0;
    border-radius: 0;
    padding: var(--s-8) var(--s-4);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
}

.header {
  margin-bottom: var(--s-6);
}

.header__eyebrow {
  font-size: var(--fs-caption);
  color: var(--text-secondary);
  margin-bottom: var(--s-2);
  letter-spacing: 0.04em;
}

.header__title {
  font-size: 22px;
  font-weight: var(--fw-medium);
  line-height: 1.3;
}

.concepts {
  display: flex;
  flex-direction: column;
  gap: var(--s-3);
}

.concept {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--s-5) var(--s-4);
  background: var(--bg-page);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-md);
  font-size: var(--fs-title);
  font-weight: var(--fw-medium);
  transition: background 80ms;
}

.concept:hover,
.concept:focus-visible {
  background: var(--bg-surface-2);
  outline: none;
}

.concept:active {
  background: var(--bg-surface);
}

.concept__arrow {
  color: var(--text-secondary);
  font-weight: var(--fw-regular);
}
</style>
</head>
<body>
<div class="page">
  <div class="container">

    <header class="header">
      <div class="header__eyebrow">SKT 통합 채널 · UT 프로토타입</div>
      <h1 class="header__title">컨셉 A/B/C 선택</h1>
    </header>

    <div class="concepts">
      <a class="concept" href="a.html">
        <span>A안</span>
        <span class="concept__arrow">→</span>
      </a>
      <a class="concept" href="b.html">
        <span>B안</span>
        <span class="concept__arrow">→</span>
      </a>
      <a class="concept" href="c.html">
        <span>C안</span>
        <span class="concept__arrow">→</span>
      </a>
    </div>

  </div>
</div>
</body>
</html>
